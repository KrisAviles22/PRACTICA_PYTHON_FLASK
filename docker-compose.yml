services:

  mongo:
    image: mongo:8
    container_name: mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  users-service:
    build: .

    container_name: users-service

    ports:
      - "8000:8000"

    environment:
      MONGO_URI: mongodb://mongo:27017
      DATABASE_NAME: users_db

    depends_on:
      - mongo

volumes:
  mongo_data: